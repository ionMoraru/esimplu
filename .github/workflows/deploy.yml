name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/esimplu
            # La prod ne doit jamais avoir de modif locale persistante :
            # main est la source de vérité. On force l'alignement strict
            # avant chaque deploy pour éviter les "git pull conflicts"
            # type package-lock.json modifié par un npm install manuel.
            git fetch origin main
            git reset --hard origin/main
            npm ci --include=dev
            npx prisma migrate deploy
            npm run build
            pm2 restart esimplu
