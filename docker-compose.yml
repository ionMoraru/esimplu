services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: esimplu
      POSTGRES_USER: esimplu
      POSTGRES_PASSWORD: esimplu_local
    volumes:
      - esimplu_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  esimplu_db_data:
